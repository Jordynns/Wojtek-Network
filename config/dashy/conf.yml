# Dashy Configuration for Wojtek Network
appConfig:
  title: Wojtek Home
  theme: colorful
  layout: auto
  iconSize: large
  
pageSections:
  - name: Network Infrastructure
    icon: fas fa-network-wired
    items:
      - title: pfSense
        description: Edge Router & Firewall
        icon: fas fa-shield-alt
        url: http://192.168.10.1
      - title: Pi-Hole
        description: DNS & Ad-blocking
        icon: fas fa-ad
        url: http://192.168.10.2/admin
      - title: Ubuntu Host
        description: Docker & Storage Host
        icon: fab fa-ubuntu
        url: http://192.168.10.3:9090

  - name: Core Services
    icon: fas fa-server
    items:
      - title: Portainer
        description: Container Management
        icon: fas fa-docker
        url: http://192.168.10.3:9000
      - title: Jellyfin
        description: Media Streaming
        icon: fas fa-film
        url: http://192.168.10.4
      - title: Vaultwarden
        description: Password Manager
        icon: fas fa-lock
        url: https://bitwarden.home.arpa
      - title: Nginx Proxy Manager
        description: Reverse Proxy
        icon: fas fa-random
        url: http://192.168.10.20:81
